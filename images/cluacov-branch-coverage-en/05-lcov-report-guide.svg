<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1280" width="1800" height="1280">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #6b7280; }
      .box-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; }
      .small { font-size: 13px; fill: #6b7280; }
      .tiny { font-size: 12px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>
<rect width="1800" height="1280" fill="#ffffff"/><text x="900" y="70" class="title" text-anchor="middle">Reading cluacov's LCOV output</text><text x="900" y="108" class="subtitle" text-anchor="middle">The left panel shows raw records; the right panel explains what each family means.</text><rect x="70" y="150" width="780" height="1080" rx="20" ry="20" fill="#f8fafc" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><rect x="930" y="150" width="800" height="1080" rx="20" ry="20" fill="#f8fafc" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="460" y="200" class="box-title" text-anchor="middle">Sample `lcov.info` fragment</text><text x="1330" y="200" class="box-title" text-anchor="middle">Record families and branch states</text><rect x="110" y="235" width="700" height="140" rx="20" ry="20" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/><text x="140" y="270" class="label mono" text-anchor="start">TN:cluacov-e2e</text><text x="140" y="298" class="label mono" text-anchor="start">SF:/path/to/e2e/sample.lua</text><rect x="110" y="410" width="700" height="150" rx="20" ry="20" fill="#dcfce7" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow)"/><text x="140" y="445" class="label mono" text-anchor="start">FN:3,classify</text><text x="140" y="473" class="label mono" text-anchor="start">FNDA:1,classify</text><text x="140" y="501" class="label mono" text-anchor="start">FNF:33</text><text x="140" y="529" class="label mono" text-anchor="start">FNH:33</text><rect x="110" y="600" width="700" height="220" rx="20" ry="20" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)"/><text x="140" y="635" class="label mono" text-anchor="start">BRDA:4,0,0,1</text><text x="140" y="663" class="label mono" text-anchor="start">BRDA:4,0,1,1</text><text x="140" y="691" class="label mono" text-anchor="start">BRDA:6,1,0,1</text><text x="140" y="719" class="label mono" text-anchor="start">BRDA:6,1,1,-</text><text x="140" y="747" class="label mono" text-anchor="start">BRF:134</text><text x="140" y="775" class="label mono" text-anchor="start">BRH:90</text><rect x="110" y="860" width="700" height="230" rx="20" ry="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/><text x="140" y="895" class="label mono" text-anchor="start">DA:4,2</text><text x="140" y="923" class="label mono" text-anchor="start">DA:5,1</text><text x="140" y="951" class="label mono" text-anchor="start">DA:9,0</text><text x="140" y="979" class="label mono" text-anchor="start">LF:238</text><text x="140" y="1007" class="label mono" text-anchor="start">LH:200</text><text x="140" y="1035" class="label mono" text-anchor="start">end_of_record</text><rect x="990" y="250" width="680" height="100" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="1330" y="282" class="box-title" text-anchor="middle">TN + SF</text><text x="1330" y="312" class="small" text-anchor="middle"><tspan x="1330" dy="0">One record per source file</tspan></text><line x1="1330" y1="350" x2="1330" y2="405" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="990" y="405" width="680" height="100" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="1330" y="437" class="box-title" text-anchor="middle">FN / FNDA / FNF / FNH</text><text x="1330" y="467" class="small" text-anchor="middle"><tspan x="1330" dy="0">Function names, hit counts and file-level totals</tspan></text><line x1="1330" y1="505" x2="1330" y2="560" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="990" y="560" width="680" height="100" rx="20" ry="20" fill="#fee2e2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/><text x="1330" y="592" class="box-title" text-anchor="middle">BRDA / BRF / BRH</text><text x="1330" y="622" class="small" text-anchor="middle"><tspan x="1330" dy="0">Branch targets and aggregate branch totals</tspan></text><line x1="1330" y1="660" x2="1330" y2="715" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="990" y="715" width="680" height="100" rx="20" ry="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/><text x="1330" y="747" class="box-title" text-anchor="middle">DA / LF / LH</text><text x="1330" y="777" class="small" text-anchor="middle"><tspan x="1330" dy="0">Per-line hit counts and aggregate line totals</tspan></text><rect x="990" y="900" width="680" height="145" rx="20" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="1330" y="932" class="box-title" text-anchor="middle">`BRDA:line,site,path,hits` decoded</text><text x="1330" y="962" class="small" text-anchor="middle"><tspan x="1330" dy="0">Site ids are local to one file. Path 0 and path 1</tspan><tspan x="1330" dy="18">are the two sorted target PCs. A `-` hit count means</tspan><tspan x="1330" dy="18">that path never ran.</tspan></text><rect x="990" y="1080" width="215" height="110" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="1097" y="1112" class="box-title" text-anchor="middle">covered</text><text x="1097" y="1142" class="small" text-anchor="middle"><tspan x="1097" dy="0">both paths hit</tspan></text><rect x="1222" y="1080" width="215" height="110" rx="20" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="1329" y="1112" class="box-title" text-anchor="middle">partial</text><text x="1329" y="1142" class="small" text-anchor="middle"><tspan x="1329" dy="0">only one path hit</tspan></text><rect x="1454" y="1080" width="215" height="110" rx="20" ry="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/><text x="1561" y="1112" class="box-title" text-anchor="middle">uncovered</text><text x="1561" y="1142" class="small" text-anchor="middle"><tspan x="1561" dy="0">no path hit</tspan></text></svg>