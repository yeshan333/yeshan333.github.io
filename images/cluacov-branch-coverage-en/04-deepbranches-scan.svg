<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1380" width="1680" height="1380">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #6b7280; }
      .box-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; }
      .small { font-size: 13px; fill: #6b7280; }
      .tiny { font-size: 12px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>
<rect width="1680" height="1380" fill="#ffffff"/><text x="840" y="70" class="title" text-anchor="middle">deepbranches.c branch discovery pipeline</text><text x="840" y="108" class="subtitle" text-anchor="middle">A linear bytecode scan that normalizes Lua version differences</text><rect x="570" y="150" width="540" height="92" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="840" y="182" class="box-title" text-anchor="middle">Input: Lua function</text><text x="840" y="212" class="small" text-anchor="middle"><tspan x="840" dy="0">Get the top-level closure passed in by</tspan><tspan x="840" dy="18">the caller</tspan></text><rect x="570" y="300" width="540" height="92" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="840" y="332" class="box-title" text-anchor="middle">Extract Proto</text><text x="840" y="362" class="small" text-anchor="middle"><tspan x="840" dy="0">Read proto->code[0..sizecode-1]</tspan></text><rect x="570" y="450" width="540" height="92" rx="20" ry="20" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow)"/><text x="840" y="482" class="box-title" text-anchor="middle">Loop over every PC</text><text x="840" y="512" class="small" text-anchor="middle"><tspan x="840" dy="0">pc = 0 .. sizecode - 1</tspan></text><rect x="570" y="600" width="540" height="92" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="840" y="632" class="box-title" text-anchor="middle">Read opcode at code[pc]</text><rect x="570" y="770" width="540" height="92" rx="20" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="840" y="802" class="box-title" text-anchor="middle">Classify opcode kind</text><text x="840" y="832" class="small" text-anchor="middle"><tspan x="840" dy="0">test / loop / iterator / other</tspan></text><rect x="570" y="1010" width="540" height="92" rx="20" ry="20" fill="#ffedd5" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/><text x="840" y="1042" class="box-title" text-anchor="middle">Create branch site</text><text x="840" y="1072" class="small" text-anchor="middle"><tspan x="840" dy="0">Store line, pc, kind and two target PCs</tspan><tspan x="840" dy="18">sorted in ascending PC order</tspan></text><rect x="570" y="1160" width="540" height="92" rx="20" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="840" y="1192" class="box-title" text-anchor="middle">Nested functions?</text><text x="840" y="1222" class="small" text-anchor="middle"><tspan x="840" dy="0">proto->p[]</tspan></text><rect x="570" y="1280" width="540" height="92" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="840" y="1312" class="box-title" text-anchor="middle">Recurse into child Proto</text><text x="840" y="1342" class="small" text-anchor="middle"><tspan x="840" dy="0">Visit nested closures and collect their</tspan><tspan x="840" dy="18">branch sites too</tspan></text><line x1="840" y1="242" x2="840" y2="300" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="392" x2="840" y2="450" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="542" x2="840" y2="600" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="692" x2="840" y2="770" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="862" x2="840" y2="1010" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="1102" x2="840" y2="1160" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="840" y1="1252" x2="840" y2="1280" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="120" y="820" width="430" height="190" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="335" y="852" class="box-title" text-anchor="middle">test opcodes</text><text x="335" y="882" class="small" text-anchor="middle"><tspan x="335" dy="0">OP_TEST, OP_TESTSET, OP_EQ,</tspan><tspan x="335" dy="18">OP_LT, OP_LE and friends. The</tspan><tspan x="335" dy="18">stable pattern is TEST followed</tspan><tspan x="335" dy="18">by JMP.</tspan></text><rect x="625" y="820" width="430" height="170" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="840" y="852" class="box-title" text-anchor="middle">loop opcodes</text><text x="840" y="882" class="small" text-anchor="middle"><tspan x="840" dy="0">OP_FORLOOP across versions, plus</tspan><tspan x="840" dy="18">OP_FORPREP as a branch-producing</tspan><tspan x="840" dy="18">entry check on Lua 5.4+.</tspan></text><rect x="1130" y="820" width="430" height="170" rx="20" ry="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2" filter="url(#shadow)"/><text x="1345" y="852" class="box-title" text-anchor="middle">iterator opcodes</text><text x="1345" y="882" class="small" text-anchor="middle"><tspan x="1345" dy="0">OP_TFORLOOP, with</tspan><tspan x="1345" dy="18">version-specific jump encoding</tspan><tspan x="1345" dy="18">differences handled by</tspan><tspan x="1345" dy="18">conditional compilation.</tspan></text><polyline points="550,865 570,865 570,1056" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><polyline points="840,955 840,1010" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/><polyline points="1130,865 1110,865 1110,1056" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-purple)"/><text x="365" y="805" class="small" text-anchor="middle">test branch</text><text x="840" y="805" class="small" text-anchor="middle">loop branch</text><text x="1315" y="805" class="small" text-anchor="middle">iterator branch</text><text x="1095" y="1225" class="small" text-anchor="start">yes</text><polyline points="1110,1206 1110,1326 1110,1326 1110,1326" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><polyline points="570,1206 250,1206 250,1350 840,1350" fill="none" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow-blue)" stroke-dasharray="10 8"/><text x="270" y="1190" class="small" text-anchor="start">no -> return accumulated branch list</text><rect x="570" y="1335" width="540" height="45" rx="20" ry="20" fill="#ecfdf5" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="840" y="1367" class="box-title" text-anchor="middle">Return the full branch list</text></svg>