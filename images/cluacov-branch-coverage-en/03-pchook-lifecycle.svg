<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 980" width="1680" height="980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #6b7280; }
      .box-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; }
      .small { font-size: 13px; fill: #6b7280; }
      .tiny { font-size: 12px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>
<rect width="1680" height="980" fill="#ffffff"/><text x="840" y="70" class="title" text-anchor="middle">pchook.c lifecycle: snapshot first, safe after GC</text><text x="840" y="108" class="subtitle" text-anchor="middle">Why the precise path can safely emit reports during shutdown</text><rect x="70" y="140" width="430" height="760" rx="20" ry="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" stroke-dasharray="8 8"/><text x="285" y="190" class="box-title" text-anchor="middle">Stage 1: Hook is active</text><text x="285" y="220" class="small" text-anchor="middle">start() to stop()</text><rect x="570" y="140" width="430" height="760" rx="20" ry="20" fill="#fff7ed" stroke="#fdba74" stroke-width="2" stroke-dasharray="8 8"/><text x="785" y="190" class="box-title" text-anchor="middle">Stage 2: stop() builds snapshots</text><text x="785" y="220" class="small" text-anchor="middle">hook disabled, aggregation runs once</text><rect x="1110" y="140" width="430" height="760" rx="20" ry="20" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="8 8"/><text x="1325" y="190" class="box-title" text-anchor="middle">Stage 3: __gc finalizer</text><text x="1325" y="220" class="small" text-anchor="middle">luaC_freeallobjects phase</text><rect x="110" y="255" width="350" height="85" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="285" y="287" class="box-title" text-anchor="middle">VM executes bytecode</text><line x1="285" y1="340" x2="285" y2="373" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="110" y="373" width="350" height="85" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="285" y="405" class="box-title" text-anchor="middle">pc_hook() fires</text><text x="285" y="435" class="small" text-anchor="middle"><tspan x="285" dy="0">one count event per</tspan><tspan x="285" dy="18">instruction</tspan></text><line x1="285" y1="458" x2="285" y2="491" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="110" y="491" width="350" height="85" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="285" y="523" class="box-title" text-anchor="middle">First visit to this Proto?</text><line x1="285" y1="576" x2="285" y2="609" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="110" y="609" width="350" height="85" rx="20" ry="20" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/><text x="285" y="641" class="box-title" text-anchor="middle">Materialize snapshot</text><text x="285" y="671" class="small" text-anchor="middle"><tspan x="285" dy="0">copy source, linedefined,</tspan><tspan x="285" dy="18">sizecode and pc->line</tspan><tspan x="285" dy="18">table into Lua-managed</tspan><tspan x="285" dy="18">storage</tspan></text><line x1="285" y1="694" x2="285" y2="727" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="110" y="727" width="350" height="85" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="285" y="759" class="box-title" text-anchor="middle">hits[pc] += 1</text><text x="285" y="789" class="small" text-anchor="middle"><tspan x="285" dy="0">pc here means the</tspan><tspan x="285" dy="18">next-instruction PC from</tspan><tspan x="285" dy="18">savedpc</tspan></text><rect x="610" y="300" width="350" height="92" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="785" y="332" class="box-title" text-anchor="middle">Disable hook</text><text x="785" y="362" class="small" text-anchor="middle"><tspan x="785" dy="0">lua_sethook(L, NULL, 0, 0)</tspan></text><line x1="785" y1="392" x2="785" y2="425" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/><rect x="610" y="425" width="350" height="92" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="785" y="457" class="box-title" text-anchor="middle">Aggregate SNAPSHOT_ALL_HITS</text><text x="785" y="487" class="small" text-anchor="middle"><tspan x="785" dy="0">per-Proto PC hits for</tspan><tspan x="785" dy="18">branchcov</tspan></text><line x1="785" y1="517" x2="785" y2="550" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/><rect x="610" y="550" width="350" height="92" rx="20" ry="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="785" y="582" class="box-title" text-anchor="middle">Aggregate SNAPSHOT_LINE_HITS</text><text x="785" y="612" class="small" text-anchor="middle"><tspan x="785" dy="0">map next-instruction PCs</tspan><tspan x="785" dy="18">back with pc - 1</tspan></text><line x1="785" y1="642" x2="785" y2="675" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/><rect x="610" y="675" width="350" height="92" rx="20" ry="20" fill="#fee2e2" stroke="#f87171" stroke-width="2" filter="url(#shadow)"/><text x="785" y="707" class="box-title" text-anchor="middle">Drop Proto* index from the hot path</text><text x="785" y="737" class="small" text-anchor="middle"><tspan x="785" dy="0">the cached snapshots no</tspan><tspan x="785" dy="18">longer depend on live</tspan><tspan x="785" dy="18">Proto pointers</tspan></text><rect x="1150" y="310" width="350" height="96" rx="20" ry="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/><text x="1325" y="342" class="box-title" text-anchor="middle">Potential danger</text><text x="1325" y="372" class="small" text-anchor="middle"><tspan x="1325" dy="0">Proto objects may already</tspan><tspan x="1325" dy="18">be freed here</tspan></text><line x1="1325" y1="406" x2="1325" y2="440" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-purple)"/><rect x="1150" y="440" width="350" height="96" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="1325" y="472" class="box-title" text-anchor="middle">Safe read path</text><text x="1325" y="502" class="small" text-anchor="middle"><tspan x="1325" dy="0">get_all_hits() and</tspan><tspan x="1325" dy="18">get_all_line_hits() return</tspan><tspan x="1325" dy="18">cached Lua tables</tspan></text><line x1="1325" y1="536" x2="1325" y2="570" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-purple)"/><rect x="1150" y="570" width="350" height="96" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="1325" y="602" class="box-title" text-anchor="middle">Persist coverage files</text><text x="1325" y="632" class="small" text-anchor="middle"><tspan x="1325" dy="0">luacov.stats.out for lines</tspan><tspan x="1325" dy="18">and lcov.info for branches</tspan></text><polyline points="460,548 570,548" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/><text x="515" y="532" class="tiny" text-anchor="middle">no snapshot needed after first write</text><polyline points="1000,548 1110,548" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow-purple)"/><text x="1055" y="532" class="tiny" text-anchor="middle">cached tables cross the shutdown boundary</text></svg>