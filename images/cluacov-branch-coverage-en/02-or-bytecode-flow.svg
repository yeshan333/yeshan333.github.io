<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1450" width="1900" height="1450">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #6b7280; }
      .box-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; }
      .small { font-size: 13px; fill: #6b7280; }
      .tiny { font-size: 12px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>
<rect width="1900" height="1450" fill="#ffffff"/><text x="950" y="70" class="title" text-anchor="middle">`if a or b or c then` bytecode flow and observability</text><rect x="120" y="120" width="1660" height="90" rx="20" ry="20" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="950" y="152" class="box-title" text-anchor="middle">if a or b or c then do_something() end</text><rect x="560" y="290" width="820" height="110" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="970" y="322" class="box-title" text-anchor="middle">PC 1: TEST a</text><text x="970" y="352" class="small" text-anchor="middle"><tspan x="970" dy="0">Branch site #1: jump to `then` if `a` is truthy</tspan></text><rect x="560" y="510" width="820" height="110" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="970" y="542" class="box-title" text-anchor="middle">PC 2: TEST b</text><text x="970" y="572" class="small" text-anchor="middle"><tspan x="970" dy="0">Branch site #2: jump to `then` if `b` is truthy</tspan></text><rect x="560" y="730" width="820" height="110" rx="20" ry="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/><text x="970" y="762" class="box-title" text-anchor="middle">PC 3: TEST c</text><text x="970" y="792" class="small" text-anchor="middle"><tspan x="970" dy="0">Branch site #3: jump to `then` if `c` is truthy</tspan></text><rect x="560" y="945" width="820" height="90" rx="20" ry="20" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="970" y="977" class="box-title" text-anchor="middle">do_something()</text><rect x="560" y="1115" width="820" height="78" rx="20" ry="20" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="970" y="1147" class="box-title" text-anchor="middle">end</text><line x1="970" y1="400" x2="970" y2="510" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="970" y1="620" x2="970" y2="730" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="970" y1="840" x2="970" y2="945" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/><line x1="970" y1="1035" x2="970" y2="1115" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><polyline points="1380,345 1620,345 1620,920 1390,920" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/><polyline points="1380,565 1530,565 1530,905 1390,905" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/><text x="1540" y="515" class="small" text-anchor="middle">truthy path</text><text x="1650" y="290" class="small" text-anchor="middle">truthy path</text><rect x="110" y="280" width="420" height="560" rx="20" ry="20" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 8"/><text x="180" y="885" class="box-title" text-anchor="start">One source line only</text><polyline points="560,785 420,785 420,1060 560,1060" fill="none" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/><text x="470" y="760" class="small" text-anchor="middle">false path skips the `then` block</text><rect x="120" y="1240" width="760" height="130" rx="20" ry="20" fill="#fff1f2" stroke="#fb7185" stroke-width="2" filter="url(#shadow)"/><text x="500" y="1272" class="box-title" text-anchor="middle">What line-level hooks can see</text><text x="500" y="1302" class="small" text-anchor="middle"><tspan x="500" dy="0">All three TEST instructions point back to the same source</tspan><tspan x="500" dy="18">line, so only one branch remains reportable after</tspan><tspan x="500" dy="18">filtering.</tspan></text><rect x="1020" y="1240" width="760" height="130" rx="20" ry="20" fill="#ecfdf5" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/><text x="1400" y="1272" class="box-title" text-anchor="middle">What PC-level hooks can see</text><text x="1400" y="1302" class="small" text-anchor="middle"><tspan x="1400" dy="0">Each TEST instruction has its own target PCs and hit</tspan><tspan x="1400" dy="18">counts, so branchcov reports three branch sites and six</tspan><tspan x="1400" dy="18">targets.</tspan></text></svg>