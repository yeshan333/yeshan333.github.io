<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #6b7280; }
      .box-title { font-size: 18px; font-weight: 700; }
      .label { font-size: 15px; }
      .small { font-size: 13px; fill: #6b7280; }
      .tiny { font-size: 12px; fill: #6b7280; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>
<rect width="1600" height="1100" fill="#ffffff"/><text x="800" y="70" class="title" text-anchor="middle">cluacov Branch Coverage: Two Paths</text><text x="800" y="110" class="subtitle" text-anchor="middle">Line-level approximation versus PC-level precision</text><rect x="70" y="150" width="680" height="860" rx="20" ry="20" fill="#fff7f7" stroke="#f2b8b5" stroke-width="2" stroke-dasharray="8 8"/><rect x="850" y="150" width="680" height="860" rx="20" ry="20" fill="#f4fff7" stroke="#b7e4c7" stroke-width="2" stroke-dasharray="8 8"/><text x="410" y="205" class="box-title" text-anchor="middle">Legacy Path: Line Hook</text><text x="410" y="235" class="small" text-anchor="middle">Lua 5.1-5.5 and LuaJIT</text><text x="1190" y="205" class="box-title" text-anchor="middle">New Path: Instruction Hook</text><text x="1190" y="235" class="small" text-anchor="middle">Lua 5.4+ only</text><rect x="150" y="270" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="410" y="302" class="box-title" text-anchor="middle">LUA_MASKLINE hook</text><text x="410" y="332" class="small" text-anchor="middle"><tspan x="410" dy="0">One callback per new source line</tspan></text><rect x="150" y="385" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="410" y="417" class="box-title" text-anchor="middle">hook.c callback</text><text x="410" y="447" class="small" text-anchor="middle"><tspan x="410" dy="0">lua_getstack + lua_getinfo("S")</tspan></text><rect x="150" y="500" width="520" height="95" rx="20" ry="20" fill="#eef6ff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/><text x="410" y="532" class="box-title" text-anchor="middle">Line hits</text><text x="410" y="562" class="small" text-anchor="middle"><tspan x="410" dy="0">data[file][line] += 1</tspan></text><rect x="150" y="615" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="410" y="647" class="box-title" text-anchor="middle">deepbranches.get()</text><text x="410" y="677" class="small" text-anchor="middle"><tspan x="410" dy="0">Static branch discovery from bytecode</tspan></text><rect x="150" y="730" width="520" height="95" rx="20" ry="20" fill="#fff3f2" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/><text x="410" y="762" class="box-title" text-anchor="middle">branchfilter</text><text x="410" y="792" class="small" text-anchor="middle"><tspan x="410" dy="0">Drop same-line branches that line hits</tspan><tspan x="410" dy="18">cannot distinguish</tspan></text><rect x="150" y="845" width="520" height="95" rx="20" ry="20" fill="#fff9db" stroke="#fde047" stroke-width="2" filter="url(#shadow)"/><text x="410" y="877" class="box-title" text-anchor="middle">Approximate branch report</text><text x="410" y="907" class="small" text-anchor="middle"><tspan x="410" dy="0">Trusted, but intentionally conservative</tspan></text><rect x="150" y="960" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="410" y="992" class="box-title" text-anchor="middle">Typical slowdown</text><text x="410" y="1022" class="small" text-anchor="middle"><tspan x="410" dy="0">28-43x geometric mean</tspan></text><line x1="410" y1="365" x2="410" y2="385" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="410" y1="480" x2="410" y2="500" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="410" y1="595" x2="410" y2="615" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="410" y1="710" x2="410" y2="730" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="410" y1="825" x2="410" y2="845" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="410" y1="940" x2="410" y2="960" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><rect x="930" y="270" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="302" class="box-title" text-anchor="middle">LUA_MASKCOUNT (count=1)</text><text x="1190" y="332" class="small" text-anchor="middle"><tspan x="1190" dy="0">One callback per VM instruction</tspan></text><rect x="930" y="385" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="417" class="box-title" text-anchor="middle">pchook.c callback</text><text x="1190" y="447" class="small" text-anchor="middle"><tspan x="1190" dy="0">lua_getinfo("f") + savedpc lookup</tspan></text><rect x="930" y="500" width="520" height="95" rx="20" ry="20" fill="#edfdf2" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="532" class="box-title" text-anchor="middle">PC hits</text><text x="1190" y="562" class="small" text-anchor="middle"><tspan x="1190" dy="0">hits[pc] += 1</tspan></text><rect x="930" y="615" width="520" height="95" rx="20" ry="20" fill="#f3efff" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="647" class="box-title" text-anchor="middle">Snapshot Proto metadata</text><text x="1190" y="677" class="small" text-anchor="middle"><tspan x="1190" dy="0">Copy source and line tables on first</tspan><tspan x="1190" dy="18">write</tspan></text><rect x="930" y="730" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="762" class="box-title" text-anchor="middle">deepbranches + branchcov</text><text x="1190" y="792" class="small" text-anchor="middle"><tspan x="1190" dy="0">Use independent target PCs; no</tspan><tspan x="1190" dy="18">branchfilter needed</tspan></text><rect x="930" y="845" width="520" height="95" rx="20" ry="20" fill="#e9fbef" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="877" class="box-title" text-anchor="middle">Precise branch report</text><text x="1190" y="907" class="small" text-anchor="middle"><tspan x="1190" dy="0">Independent counts for short-circuit</tspan><tspan x="1190" dy="18">tests</tspan></text><rect x="930" y="960" width="520" height="95" rx="20" ry="20" fill="#ffffff" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="1190" y="992" class="box-title" text-anchor="middle">Typical slowdown</text><text x="1190" y="1022" class="small" text-anchor="middle"><tspan x="1190" dy="0">36-54x geometric mean</tspan></text><line x1="1190" y1="365" x2="1190" y2="385" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="1190" y1="480" x2="1190" y2="500" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="1190" y1="595" x2="1190" y2="615" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="1190" y1="710" x2="1190" y2="730" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="1190" y1="825" x2="1190" y2="845" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><line x1="1190" y1="940" x2="1190" y2="960" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/><text x="155" y="1035" class="small" text-anchor="start">Blind spot: same-line short-circuit tests share one line hit.</text><text x="935" y="1035" class="small" text-anchor="start">Trade-off: more events, much better branch visibility.</text></svg>