<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">vLLM 把零散请求揉成 GPU 批处理</title>
  <desc id="desc">手绘风白板图：左侧是不同用户请求，中间是 vLLM 调度器，右侧是 GPU 上的 SM 和 warp。</desc>
  <rect width="1200" height="720" fill="#fffdf7"/>
  <style>
    .ink{fill:none;stroke:#111827;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .thin{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .blue{fill:#dbeafe;stroke:#1d4ed8;stroke-width:4;stroke-linejoin:round}
    .green{fill:#dcfce7;stroke:#15803d;stroke-width:4;stroke-linejoin:round}
    .orange{fill:#ffedd5;stroke:#c2410c;stroke-width:4;stroke-linejoin:round}
    .yellow{fill:#fef3c7;stroke:#a16207;stroke-width:4;stroke-linejoin:round}
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;fill:#111827}
    .h{font-size:34px;font-weight:800}
    .m{font-size:24px;font-weight:700}
    .s{font-size:19px;font-weight:600}
  </style>

  <text x="54" y="62" class="h">不是“一请求一 GPU”，而是先揉成一批</text>
  <text x="58" y="102" class="s">网关看到的是很多连接；GPU 想要的是一批形状相近的并行计算。</text>

  <path class="blue" d="M70 160 C72 145 260 146 264 162 L260 235 C255 248 76 247 72 232 Z"/>
  <text x="96" y="196" class="m">请求 A</text>
  <text x="96" y="224" class="s">长 prompt</text>

  <path class="blue" d="M96 278 C103 263 279 269 280 283 L275 348 C270 363 91 358 88 344 Z"/>
  <text x="122" y="314" class="m">请求 B</text>
  <text x="122" y="342" class="s">decode 1 token</text>

  <path class="blue" d="M64 395 C72 379 244 385 250 398 L248 468 C240 482 70 479 66 464 Z"/>
  <text x="94" y="432" class="m">请求 C</text>
  <text x="94" y="460" class="s">命中前缀</text>

  <path class="ink" d="M290 205 C350 218 379 246 422 287"/>
  <path class="ink" d="M303 320 C353 319 383 322 422 330"/>
  <path class="ink" d="M282 430 C345 407 380 384 424 350"/>

  <path class="orange" d="M430 220 C442 198 650 204 664 223 L655 440 C640 464 445 456 432 438 Z"/>
  <text x="474" y="270" class="h">Scheduler</text>
  <text x="478" y="314" class="m">按 token budget</text>
  <text x="478" y="350" class="m">挑本轮工作</text>
  <path class="thin" d="M476 382 C520 370 566 372 620 386"/>
  <text x="482" y="422" class="s">输出：一批 token + KV 位置</text>

  <path class="ink" d="M675 330 C724 330 752 330 800 330"/>
  <path class="ink" d="M782 305 L810 330 L782 356"/>

  <path class="green" d="M820 170 C842 145 1090 150 1110 175 L1100 520 C1080 548 840 542 824 516 Z"/>
  <text x="890" y="224" class="h">GPU</text>
  <path class="yellow" d="M860 270 C872 250 1000 252 1010 270 L1003 342 C988 358 868 352 862 338 Z"/>
  <text x="895" y="313" class="m">SM</text>
  <path class="yellow" d="M870 382 C888 364 1032 368 1040 388 L1034 462 C1018 478 884 474 874 456 Z"/>
  <text x="906" y="424" class="m">warp × N</text>

  <path class="thin" d="M874 568 C938 540 1012 542 1082 568"/>
  <text x="852" y="620" class="s">同类算子一起跑，分支越少越舒服</text>
</svg>
